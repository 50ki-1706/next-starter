name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_CLIENT_ID: dummy-client-id-for-ci
      GOOGLE_CLIENT_SECRET: dummy-client-secret-for-ci
      BETTER_AUTH_SECRET: dummy-secret-for-ci-build
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7
        with:
          enable-cache: true

      - name: Verify commit message
        run: devbox run -- cocogitto verify

      - name: Install dependencies
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Verify
        run: devbox run -- pnpm verify

      - name: Build
        run: devbox run -- pnpm build
